name: Security audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  rustsec:
    name: RustSec (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install cargo-audit
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit

  pipaudit:
    name: Python (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip "pip-audit>=2,<3"
      - name: Audit python/typra environment
        run: |
          python -m pip install -e python/typra
          python -m pip install -r docs/requirements.txt
          python -m pip install -U "maturin>=1.5,<2" "pytest>=8" "ruff>=0.8" "ty>=0.0.28"
          python -m pip_audit
