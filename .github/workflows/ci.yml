name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features

      - name: cargo test
        run: cargo test --workspace --all-features

  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (PyO3)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-dev pkg-config

      - name: Create venv and run pytest
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            VENV_PY="$(pwd)/.venv/Scripts/python.exe"
          else
            VENV_PY="$(pwd)/.venv/bin/python"
          fi
          "$VENV_PY" -m pip install -U pip "maturin>=1.5,<2" "pytest>=8" "ruff>=0.8" "ty>=0.0.28"
          cd python/typra
          "$VENV_PY" -m maturin develop --release
          "$VENV_PY" -m pytest -v
          cd "${GITHUB_WORKSPACE}"
          "$VENV_PY" -m ruff format --check python
          "$VENV_PY" -m ruff check python
          env -u VIRTUAL_ENV "$VENV_PY" -m ty check --python "$VENV_PY" --python-version ${{ matrix.python-version }} python
          bash ./scripts/verify-doc-examples.sh
