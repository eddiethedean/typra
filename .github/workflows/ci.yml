name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight (docs + examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            docs/requirements.txt

      - name: Install system deps (PyO3)
        run: sudo apt-get update && sudo apt-get install -y python3-dev pkg-config

      - name: Run check-full (fast gate)
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          make check-full

      - name: Upload docs site (artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docs-site
          path: site

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: [preflight]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features

      - name: cargo test
        run: cargo test --workspace --all-features

  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    needs: [preflight]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            python/typra/pyproject.toml
            docs/requirements.txt

      - name: Install system deps (PyO3)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-dev pkg-config

      - name: Create venv and run Python checks/tests
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            VENV_PY="$(pwd)/.venv/Scripts/python.exe"
          else
            VENV_PY="$(pwd)/.venv/bin/python"
          fi
          "$VENV_PY" -m pip install -U pip
          "$VENV_PY" -m pip install -U "maturin>=1.5,<2" "pytest>=8" "ruff>=0.8" "ty>=0.0.28"
          cd python/typra
          "$VENV_PY" -m maturin develop --release
          "$VENV_PY" -m pytest -v
          cd "${GITHUB_WORKSPACE}"
          "$VENV_PY" -m ruff format --check python
          "$VENV_PY" -m ruff check python
          env -u VIRTUAL_ENV "$VENV_PY" -m ty check --python "$VENV_PY" --python-version ${{ matrix.python-version }} python
