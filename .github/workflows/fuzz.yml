name: Fuzz (smoke)

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # weekly
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust (nightly for cargo-fuzz/ASAN)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb
        with:
          tool: cargo-fuzz

      - name: Run fuzz targets (short budget)
        working-directory: fuzz
        run: |
          set -euo pipefail
          cargo +nightly fuzz run --target x86_64-unknown-linux-gnu decode_file_header -- -max_total_time=10
          cargo +nightly fuzz run --target x86_64-unknown-linux-gnu decode_superblock -- -max_total_time=10
          cargo +nightly fuzz run --target x86_64-unknown-linux-gnu decode_segment_header -- -max_total_time=10
          cargo +nightly fuzz run --target x86_64-unknown-linux-gnu scan_segments_vecstore -- -max_total_time=10

