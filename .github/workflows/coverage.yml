name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1
        with:
          tool: cargo-llvm-cov

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            python/typra/pyproject.toml
            docs/requirements.txt

      - name: Install system deps (PyO3)
        run: sudo apt-get update && sudo apt-get install -y python3-dev pkg-config

      - name: Prepare venv + tools
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          make install-tools

      - name: Rust coverage (gated)
        run: make coverage-rust

      - name: Python coverage (gated)
        run: make coverage-python

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage
          path: |
            target/coverage/rust.lcov
            target/coverage/python.xml

