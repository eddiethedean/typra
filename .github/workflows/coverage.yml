name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1
        with:
          tool: cargo-llvm-cov

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            python/typra/pyproject.toml
            docs/requirements.txt

      - name: Install system deps (PyO3)
        run: sudo apt-get update && sudo apt-get install -y python3-dev pkg-config

      - name: Prepare venv + tools
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          make install-tools

      - name: Rust coverage (gated)
        run: make coverage-rust

      - name: Python coverage (gated)
        run: make coverage-python

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage
          path: |
            target/coverage/rust.lcov
            target/coverage/python.xml

