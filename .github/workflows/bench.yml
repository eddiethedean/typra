name: Bench (on demand)

on:
  workflow_dispatch: {}

jobs:
  benches:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benches (typra-core)
        run: |
          cargo bench -p typra-core --bench query -- --nocapture
          cargo bench -p typra-core --bench workflows -- --nocapture

