name: Bench (on demand)

on:
  workflow_dispatch: {}

jobs:
  benches:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Run Criterion benches (typra-core)
        run: |
          cargo bench -p typra-core --bench query -- --nocapture
          cargo bench -p typra-core --bench workflows -- --nocapture

      - name: Upload Criterion artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: criterion-${{ matrix.os }}
          path: |
            target/criterion

      - name: Compare note (how to diff)
        if: ${{ always() }}
        run: |
          echo "To compare two runs locally:"
          echo "  python scripts/bench_compare.py --base <criterion_old> --new <criterion_new>"

