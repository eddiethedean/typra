name: Publish

on:
  push:
    tags:
      # e.g. v0.1.0 — must match [workspace.package] version in Cargo.toml
      - "v[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert tag matches workspace version
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          FILE_VER=$(grep -E '^version = ' Cargo.toml | head -1 | sed -n 's/.*"\([^"]*\)".*/\1/p')
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo "Tag version ($TAG_VER) must match Cargo.toml [workspace.package] version ($FILE_VER)" >&2
            exit 1
          fi
          echo "Publishing version $TAG_VER"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (PyO3 / maturin)
        run: sudo apt-get update && sudo apt-get install -y python3-dev pkg-config

      - name: Install maturin
        run: pip install "maturin>=1.5,<2"

      - name: Publish to crates.io and PyPI
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          MATURIN_NON_INTERACTIVE: "1"
        run: ./scripts/publish-all.sh
